apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mautic-5
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mautic.djnd.si
      secretName: mautic-5-tls
  rules:
    - host: mautic.djnd.si
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mautic-5
                port:
                  number: 80
